name: Daily Trending Repos Digest

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of repos to fetch (default 20)'
        required: false
        default: '20'

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate digest
        run: node scripts/generate-digest.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          DIGEST_COUNT: ${{ github.event.inputs.count || '20' }}
